<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Search – Amazon &amp; Flipkart</title>
    <style>
        /* ── Reset & Base ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            min-height: 100vh;
        }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, #232526, #414345);
            color: #fff;
            padding: 32px 16px 28px;
            text-align: center;
        }
        .header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 6px; }
        .header p  { font-size: 0.95rem; opacity: 0.8; }

        /* ── Search Bar ── */
        .search-container {
            max-width: 680px;
            margin: -24px auto 0;
            padding: 0 16px;
            position: relative;
            z-index: 1;
        }
        .search-box {
            display: flex;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,.12);
            overflow: hidden;
        }
        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            padding: 16px 20px;
            font-size: 1rem;
        }
        .search-box button {
            background: linear-gradient(135deg, #ff6f00, #ff8f00);
            color: #fff;
            border: none;
            padding: 16px 28px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s;
        }
        .search-box button:hover { opacity: .9; }
        .search-box button:disabled { opacity: .5; cursor: not-allowed; }

        /* ── Status ── */
        .status {
            text-align: center;
            margin: 24px 0 8px;
            font-size: .95rem;
            color: #555;
        }
        .status.error { color: #d32f2f; }

        /* ── Loader ── */
        .loader {
            display: none;
            text-align: center;
            margin: 32px 0;
        }
        .loader.active { display: block; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #ff6f00;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Results Container ── */
        .results-wrapper {
            max-width: 1300px;
            margin: 16px auto 40px;
            padding: 0 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        @media (max-width: 800px) { .results-wrapper { grid-template-columns: 1fr; } }

        .column-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        .column-header img { height: 28px; }
        .column-header h2 { font-size: 1.15rem; font-weight: 600; }
        .column-header .count {
            background: #e8e8e8;
            border-radius: 12px;
            padding: 2px 10px;
            font-size: .8rem;
            color: #555;
        }

        .source-error {
            background: #fff3e0;
            color: #e65100;
            border-radius: 8px;
            padding: 12px;
            font-size: .9rem;
            margin-bottom: 12px;
        }

        /* ── Product Card ── */
        .product-card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 1px 6px rgba(0,0,0,.07);
            padding: 14px;
            display: flex;
            gap: 14px;
            margin-bottom: 12px;
            transition: box-shadow .2s;
        }
        .product-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.13); }
        .product-card img {
            width: 100px; height: 100px;
            object-fit: contain;
            border-radius: 6px;
            background: #fafafa;
            flex-shrink: 0;
        }
        .product-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .product-title {
            font-size: .93rem;
            font-weight: 600;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .product-title a {
            color: inherit;
            text-decoration: none;
        }
        .product-title a:hover { color: #ff6f00; }
        .product-price { font-size: 1.05rem; font-weight: 700; color: #2e7d32; }
        .product-rating { font-size: .82rem; color: #888; }
        .product-rating .star { color: #ffa000; }

        .no-results {
            text-align: center;
            color: #999;
            padding: 32px 0;
            font-size: .95rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛒 Product Search</h1>
        <p>Search across Amazon &amp; Flipkart instantly</p>
    </div>

    <div class="search-container">
        <form class="search-box" id="searchForm">
            <input type="text" id="queryInput" placeholder="Search for a product… e.g. iPhone 15, laptop, headphones" autocomplete="off" required />
            <button type="submit" id="searchBtn">Search</button>
        </form>
    </div>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p>Searching Amazon &amp; Flipkart…</p>
    </div>

    <p class="status" id="status"></p>

    <div class="results-wrapper" id="results" style="display:none;">
        <!-- Amazon Column -->
        <div>
            <div class="column-header">
                <h2>Amazon</h2>
                <span class="count" id="amazonCount">0</span>
            </div>
            <div id="amazonError"></div>
            <div id="amazonResults"></div>
        </div>
        <!-- Flipkart Column -->
        <div>
            <div class="column-header">
                <h2>Flipkart</h2>
                <span class="count" id="flipkartCount">0</span>
            </div>
            <div id="flipkartError"></div>
            <div id="flipkartResults"></div>
        </div>
    </div>

    <script>
        const form      = document.getElementById('searchForm');
        const input     = document.getElementById('queryInput');
        const btn       = document.getElementById('searchBtn');
        const loader    = document.getElementById('loader');
        const status    = document.getElementById('status');
        const results   = document.getElementById('results');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = input.value.trim();
            if (!query) return;

            // UI reset
            btn.disabled = true;
            loader.classList.add('active');
            results.style.display = 'none';
            status.textContent = '';
            status.className = 'status';

            try {
                const resp = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                if (!resp.ok) throw new Error(`Server error: ${resp.status}`);
                const data = await resp.json();
                renderResults(data);
            } catch (err) {
                status.textContent = `Error: ${err.message}`;
                status.className = 'status error';
            } finally {
                loader.classList.remove('active');
                btn.disabled = false;
            }
        });

        function renderResults(data) {
            const amazonResults   = document.getElementById('amazonResults');
            const flipkartResults = document.getElementById('flipkartResults');
            const amazonError     = document.getElementById('amazonError');
            const flipkartError   = document.getElementById('flipkartError');

            amazonResults.innerHTML   = '';
            flipkartResults.innerHTML = '';
            amazonError.innerHTML     = '';
            flipkartError.innerHTML   = '';

            document.getElementById('amazonCount').textContent   = data.amazon_results.length;
            document.getElementById('flipkartCount').textContent = data.flipkart_results.length;

            if (data.amazon_error) {
                amazonError.innerHTML = `<div class="source-error">⚠️ ${escapeHtml(data.amazon_error)}</div>`;
            }
            if (data.flipkart_error) {
                flipkartError.innerHTML = `<div class="source-error">⚠️ ${escapeHtml(data.flipkart_error)}</div>`;
            }

            if (data.amazon_results.length === 0 && !data.amazon_error) {
                amazonResults.innerHTML = '<div class="no-results">No results found on Amazon</div>';
            } else {
                data.amazon_results.forEach(p => amazonResults.appendChild(buildCard(p)));
            }

            if (data.flipkart_results.length === 0 && !data.flipkart_error) {
                flipkartResults.innerHTML = '<div class="no-results">No results found on Flipkart</div>';
            } else {
                data.flipkart_results.forEach(p => flipkartResults.appendChild(buildCard(p)));
            }

            status.textContent = `Found ${data.total_results} products for "${escapeHtml(data.query)}"`;
            results.style.display = 'grid';
        }

        function buildCard(product) {
            const card = document.createElement('div');
            card.className = 'product-card';

            const imgSrc = product.image || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect width="100" height="100" fill="%23eee"/><text x="50%" y="50%" text-anchor="middle" dy=".3em" fill="%23aaa" font-size="12">No Image</text></svg>';

            const ratingHtml = product.rating
                ? `<div class="product-rating"><span class="star">★</span> ${escapeHtml(product.rating)}</div>`
                : '';

            card.innerHTML = `
                <img src="${escapeHtml(imgSrc)}" alt="" loading="lazy" />
                <div class="product-info">
                    <div class="product-title"><a href="${escapeHtml(product.link)}" target="_blank" rel="noopener">${escapeHtml(product.title)}</a></div>
                    <div class="product-price">${escapeHtml(product.price)}</div>
                    ${ratingHtml}
                </div>
            `;
            return card;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
